<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Catcher — Environmental Noise Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #ffffff;
        }
        h1 span {
            color: #4fc3f7;
        }
        .subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }
        .graph-container {
            width: 100%;
            max-width: 1200px;
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .graph-container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
        .meta {
            margin-top: 1.5rem;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .meta strong {
            color: #ccc;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
        }
        footer a {
            color: #4fc3f7;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            body { padding: 1rem 0.5rem; }
            h1 { font-size: 1.4rem; }
            .graph-container { padding: 0.75rem; border-radius: 8px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Noise <span>Catcher</span></h1>
        <p class="subtitle">Environmental Noise Monitor</p>
        <nav style="margin-top: 0.8rem; display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap;">
            <a href="archive.html"
               style="color:#4fc3f7; text-decoration:none; padding:0.3rem 0.8rem;
                      border:1px solid #4fc3f7; border-radius:6px; font-size:0.85rem;
                      transition:background 0.2s;">Archive</a>
            <a href="{{WEEKLY_SUMMARY_PATH}}"
               style="color:#4fc3f7; text-decoration:none; padding:0.3rem 0.8rem;
                      border:1px solid #4fc3f7; border-radius:6px; font-size:0.85rem;
                      transition:background 0.2s;">Weekly Summary</a>
            <a href="{{MONTHLY_SUMMARY_PATH}}"
               style="color:#4fc3f7; text-decoration:none; padding:0.3rem 0.8rem;
                      border:1px solid #4fc3f7; border-radius:6px; font-size:0.85rem;
                      transition:background 0.2s;">Monthly Summary</a>
            <a href="all_time_trend.png"
               style="color:#4fc3f7; text-decoration:none; padding:0.3rem 0.8rem;
                      border:1px solid #4fc3f7; border-radius:6px; font-size:0.85rem;
                      transition:background 0.2s;">All-Time Trend</a>
        </nav>
    </header>
    <main class="graph-container">
        <img src="{{IMAGE_PATH}}" alt="Noise graph for {{DATE}}">
        <div class="meta">
            <p><strong>Date:</strong> {{DATE}}</p>
            <p><strong>Last updated:</strong> {{TIMESTAMP}}</p>
        </div>
    </main>
    <footer>
        <p><a href="https://github.com/coldsoul/noise-catcher">View on GitHub</a></p>
    </footer>
</body>
</html>
