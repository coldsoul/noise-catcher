# Noise Catcher log and database rotation
#
# The daemon rotates the active database daily (noise_catcher.db →
# noise_catcher.YYYY-MM-DD.db) and prunes rotated DBs older than 30 days
# automatically. This config handles:
#   1. The publish log (text log, not the DB)
#   2. Any rotated DB files that the daemon's prune_old_databases() missed
#
# Daily database file size: ~5 MB → ~150 MB/month retained

# Publish log rotation — weekly, keep 1 month
/home/pi/noise-catcher/logs/publish.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

# Rotated DB cleanup — safety net for daemon prune_old_databases()
# Removes rotated DBs older than 30 days (daemon handles primary cleanup)
# Uses lastaction to glob-delete old files since logrotate can't glob per-file
/home/pi/noise-catcher/noise_catcher.0.db {
    monthly
    rotate 0
    missingok
    notifempty
    lastaction
        find /home/pi/noise-catcher/ -name "noise_catcher.*.db" -mtime +30 -delete 2>/dev/null || true
    endscript
}
