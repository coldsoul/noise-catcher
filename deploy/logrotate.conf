# Noise Catcher database rotation — monthly, keep 3 months
#
# The daemon writes to noise_catcher.db continuously.
# This rotates it monthly so the active DB stays a manageable size.
# Rotated files are compressed and historic DBs are kept for 3 months.
#
# After rotation the daemon is restarted so it creates a fresh DB.

/home/pi/noise-catcher/noise_catcher.db {
    monthly
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    postrotate
        systemctl restart noise-catcher > /dev/null 2>&1 || true
    endscript
}
